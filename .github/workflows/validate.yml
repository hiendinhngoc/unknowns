name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: python3 scripts/validate_skills.py
      - name: Test validator
        run: python3 -m unittest discover -s tests -p 'test_*.py'
